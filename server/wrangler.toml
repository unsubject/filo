name = "filo"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Serve the built SPA (web/dist) as static assets from THIS same Worker, so the
# app and the API share one origin (filo.unsubject.com) — no CORS, no second
# Worker. API paths run the Worker first; every other path serves a static file,
# falling back to index.html for client-side routes (SPA). The web build must
# run before deploy so ../web/dist exists (see the build command in the README).
[assets]
directory = "../web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/documents", "/documents/*"]

# D1 binding. Fill in database_id after `wrangler d1 create filo`.
[[d1_databases]]
binding = "DB"
database_name = "filo"
database_id = "231c6ee9-fe86-492c-915f-1dbcef7d239e"
migrations_dir = "migrations"

# Non-secret vars. Real secrets are set via `wrangler secret put`.
[vars]
# FILO_BEARER_TOKEN and ANTHROPIC_API_KEY are declared here for local dev only.
# In production set them as secrets:
#   wrangler secret put FILO_BEARER_TOKEN
#   wrangler secret put ANTHROPIC_API_KEY
# Optional 2nd-brain push target (leave unset to disable push):
#   wrangler secret put SECOND_BRAIN_URL
#   wrangler secret put SECOND_BRAIN_TOKEN
FILO_ENV = "production"
# Allowed CORS origin(s) for the SPA — the frontend is served from the custom
# domain below. Accepts "*" or a comma-separated allowlist; add the *.pages.dev
# preview origin here too if you want to exercise the API from preview builds.
CORS_ORIGIN = "https://filo.unsubject.com"

# Observability — keep this in sync with the dashboard so git deploys don't
# reset it. Logs are enabled (with invocation logs); traces stay off.
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1
persist = true
